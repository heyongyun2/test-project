name: 运行Python脚本
on: [push] # 可根据需要修改触发条件，如 pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # 可根据你的项目版本修改

      # 👇 新增：安装依赖（核心步骤）
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests # 安装requests库
          # 如果有requirements.txt，可替换为 pip install -r requirements.txt

      - name: 运行代码
        run: python jiaoben3.py # 你的脚本名